name: 'publish'

on:
  workflow_dispatch:
  push:
    branches:
      - release

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.create.outputs.tag }}
    steps:
      - uses: actions/checkout@v7

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Create draft release
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          TAG="app-v${VERSION}"
          gh release create "$TAG" \
            --title "App v${VERSION}" \
            --notes "See the assets below to download and install." \
            --draft
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  publish-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # Apple Silicon (M1 and above)
            args: '--target aarch64-apple-darwin'
            label: 'mac-apple-silicon'
          - platform: 'macos-latest' # Intel Macs
            args: '--target x86_64-apple-darwin'
            label: 'mac-intel'
          - platform: 'windows-latest'
            args: ''
            label: 'windows'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        run: pnpm tauri build ${{ matrix.args }}

      - name: Upload release artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          LABEL="${{ matrix.label }}"

          if [[ "$LABEL" == "mac-apple-silicon" ]]; then
            DMG=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
            gh release upload "$TAG" "${DMG}#time-tracker_${VERSION}_mac-apple-silicon.dmg" --clobber

          elif [[ "$LABEL" == "mac-intel" ]]; then
            DMG=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
            gh release upload "$TAG" "${DMG}#time-tracker_${VERSION}_mac-intel.dmg" --clobber

          else
            EXE=$(find src-tauri/target/release/bundle/nsis -name "*-setup.exe" | head -1)
            gh release upload "$TAG" "${EXE}#time-tracker_${VERSION}_windows.exe" --clobber
            MSI=$(find src-tauri/target/release/bundle/msi -name "*.msi" | head -1)
            gh release upload "$TAG" "${MSI}#time-tracker_${VERSION}_windows.msi" --clobber
          fi
